['cmsg'] = window['cmsg'] || { locale: "en", strings: {} };})();</script><script src="_assets/cd5d0edf4f32aefe.runtime.js" defer nonce="888937a6-936d-4ca1-91bf-5e21a0327556"></script><script src="_assets/fb765918bdc2d19b.s4le6a.vendor.js" defer nonce="888937a6-936d-4ca1-91bf-5e21a0327556"></script><script src="_assets/0fb5f701f46ae649.vendor.js" defer nonce="888937a6-936d-4ca1-91bf-5e21a0327556"></script><script src="_assets/a0d72a6f160e1f66.strings.js" nonce="888937a6-936d-4ca1-91bf-5e21a0327556"></script><script src="_assets/7c07fdff3ebdc1ac.en.js" nonce="888937a6-936d-4ca1-91bf-5e21a0327556"></script><script src="_assets/3a4c4b43e41f6c9a.js" defer nonce="888937a6-936d-4ca1-91bf-5e21a0327556"></script>
<script>
(function() {
  /* ── helpers ── */
  function findByText(root, text) {
    var spans = root.querySelectorAll('span');
    for (var i = 0; i < spans.length; i++) {
      if (spans[i].textContent.trim() === text && spans[i].children.length === 0) return spans[i];
    }
    return null;
  }
  function findByTextIncludes(root, text) {
    var spans = root.querySelectorAll('span');
    for (var i = 0; i < spans.length; i++) {
      if (spans[i].textContent.trim().indexOf(text) !== -1 && spans[i].children.length === 0) return spans[i];
    }
    return null;
  }
  function findSmallestTextElement(root, text) {
    var all = root.querySelectorAll('*');
    for (var i = 0; i < all.length; i++) {
      var el = all[i];
      var content = (el.innerText || '').trim();
      if (content !== text) continue;
      var childHasSameText = false;
      for (var j = 0; j < el.children.length; j++) {
        if ((el.children[j].innerText || '').trim() === text) {
          childHasSameText = true;
          break;
        }
      }
      if (!childHasSameText) return el;
    }
    return null;
  }
  function eventIsInsideDropdown(e) {
    var target = e && e.target;
    return !!(target && target.closest && target.closest('.rsvp-dropdown'));
  }

  /* hit-test helper: returns true if event coords are inside el's bounding rect (with optional padding) */
  function hitsRect(e, el, pad) {
    if (!el || !el.isConnected) return false;
    var cx = e.clientX, cy = e.clientY;
    var rect = el.getBoundingClientRect();
    if (rect.width === 0) return false;
    var p = pad || 0;
    return cx >= rect.left - p && cx <= rect.right + p && cy >= rect.top - p && cy <= rect.bottom + p;
  }

  function placeCursorAtEnd(el) {
    if (!el) return;
    requestAnimationFrame(function() {
      try {
        var sel = window.getSelection();
        var range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
      } catch(e) {}
    });
  }

  function applyColor(el, color) {
    if (!el) return;
    el.style.setProperty('color', color, 'important');
    el.style.setProperty('-webkit-text-fill-color', color, 'important');
    var ch = el.querySelectorAll('*');
    for (var i = 0; i < ch.length; i++) {
      ch[i].style.setProperty('color', color, 'important');
      ch[i].style.setProperty('-webkit-text-fill-color', color, 'important');
    }
  }

  /* ── CSS ── */
  var css = document.createElement('style');
  css.innerHTML = [
    '.rsvp-dropdown { position:fixed; z-index:999999; background:#fffaf0; border:1px solid #d4c3b3;',
    '  box-shadow:0 4px 12px rgba(0,0,0,.12); min-width:220px; padding:4px 0; }',
    '.rsvp-dropdown-item { padding:10px 20px; cursor:pointer; font-family:"Gotham",sans-serif;',
    '  font-size:15px; color:#4b3526; }',
    '.rsvp-dropdown-item:hover { background:#f4e8d2; }',
    '.rsvp-dropdown-item.selected { font-weight:600; }',
  ].join('\n');
  document.head.appendChild(css);

  /* ── make a text field ── */
  function makeTextField(placeholder, storageKey, resolver) {
    var field = resolver ? resolver() : (findByText(document, placeholder) || findByTextIncludes(document, placeholder));
    if (!field || field._rsvpBound) return;
    field._rsvpBound = true;

    field.contentEditable = 'true';
    field.style.outline = 'none';
    field.style.cursor = 'text';
    field.style.userSelect = 'text';
    field.style.webkitUserSelect = 'text';
    if (field.tagName === 'SPAN') {
      field.style.minWidth = '120px';
      field.style.display = 'inline-block';
    }

    var saved = sessionStorage.getItem(storageKey);
    if (saved) { field.textContent = saved; applyColor(field, '#4b3526'); }
    else { applyColor(field, '#9a8678'); }

    field.addEventListener('focus', function() {
      if (field.textContent.trim() === placeholder) field.textContent = '';
      applyColor(field, '#4b3526');
    });
    field.addEventListener('blur', function() {
      var val = field.textContent.trim();
      if (!val) { field.textContent = placeholder; applyColor(field, '#9a8678'); sessionStorage.removeItem(storageKey); }
      else { sessionStorage.setItem(storageKey, val); applyColor(field, '#4b3526'); }
    });
    field.addEventListener('input', function(e) {
      if (e && !e.isTrusted) return;
      var val = field.textContent.trim();
      if (val && val !== placeholder) sessionStorage.setItem(storageKey, val);
    });
    field.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); field.blur(); }
    });

    /* pointerdown: block Canva from eating the tap; click: actually focus */
    function fieldBlock(e) {
      if (eventIsInsideDropdown(e)) return;
      if (hitsRect(e, field, 15)) { e.preventDefault(); e.stopImmediatePropagation(); }
    }
    function fieldFocus(e) {
      if (eventIsInsideDropdown(e)) return;
      if (hitsRect(e, field, 15)) {
        e.preventDefault(); e.stopImmediatePropagation();
        field.focus(); placeCursorAtEnd(field);
      }
    }
    document.addEventListener('pointerdown', fieldBlock, true);
    document.addEventListener('click', fieldFocus, true);
  }

  /* ── make a dropdown field ── */
  function makeDropdown(labelText, options, storageKey, resolver) {
    var field = resolver ? resolver() : (findByText(document, labelText) || findByTextIncludes(document, labelText));
    if (!field || field._rsvpBound) return;
    field._rsvpBound = true;
    field.style.cursor = 'pointer';

    var saved = sessionStorage.getItem(storageKey);
    if (saved) { field.textContent = saved; applyColor(field, '#4b3526'); }

    function showDropdown(e) {
      e.preventDefault(); e.stopPropagation();
      /* close any existing */
      var old = document.querySelector('.rsvp-dropdown');
      if (old) old.remove();

      var dd = document.createElement('div');
      dd.className = 'rsvp-dropdown';
      var rect = field.getBoundingClientRect();
      dd.style.left = rect.left + 'px';
      dd.style.top = (rect.bottom + 4) + 'px';

      var current = sessionStorage.getItem(storageKey) || '';

      for (var i = 0; i < options.length; i++) {
        (function(opt) {
          var item = document.createElement('div');
          item.className = 'rsvp-dropdown-item';
          if (opt === current) item.className += ' selected';
          item.textContent = opt;
          item.addEventListener('click', function(ev) {
            ev.stopPropagation();
            field.textContent = opt;
            sessionStorage.setItem(storageKey, opt);
            applyColor(field, '#4b3526');
            dd.remove();
          });
          dd.appendChild(item);
        })(options[i]);
      }
      document.body.appendChild(dd);

      /* close on outside click */
      setTimeout(function() {
        document.addEventListener('click', function handler(ev) {
          if (!dd.contains(ev.target)) { dd.remove(); document.removeEventListener('click', handler); }
        });
      }, 0);
    }

    /* pointerdown: block Canva from eating the tap; click: open menu */
    function dropdownBlock(e) {
      if (eventIsInsideDropdown(e)) return;
      if (hitsRect(e, field, 15)) { e.preventDefault(); e.stopImmediatePropagation(); }
    }
    function dropdownOpen(e) {
      if (eventIsInsideDropdown(e)) return;
      if (hitsRect(e, field, 15)) { showDropdown(e); }
    }
    document.addEventListener('pointerdown', dropdownBlock, true);
    document.addEventListener('click', dropdownOpen, true);
  }

  /* ── SUBMIT RSVP button ── */
  function wireSubmit() {
    var span = findByText(document, 'SUBMIT RSVP');
    if (!span || span._rsvpBound) return;
    span._rsvpBound = true;

    function getSubmitRect() {
      var parent = span;
      for (var i = 0; i < 8; i++) { if (parent.parentElement) parent = parent.parentElement; else break; }
      return parent.getBoundingClientRect();
    }
    function submitBlock(e) {
      if (!span.isConnected) return;
      var pRect = getSubmitRect();
      if (e.clientX >= pRect.left && e.clientX <= pRect.right &&
          e.clientY >= pRect.top && e.clientY <= pRect.bottom) {
        e.preventDefault(); e.stopImmediatePropagation();
      }
    }
    function submitAction(e) {
      if (!span.isConnected) return;
      var pRect = getSubmitRect();
      if (e.clientX >= pRect.left && e.clientX <= pRect.right &&
          e.clientY >= pRect.top && e.clientY <= pRect.bottom) {
        e.preventDefault(); e.stopImmediatePropagation();

        var data = {
          guestName: sessionStorage.getItem('rsvpGuestName') || '',
          attending: sessionStorage.getItem('rsvpAttending') || '',
          accommodation: sessionStorage.getItem('rsvpAccommodation') || '',
          transportation: sessionStorage.getItem('rsvpTransportation') || '',
          dietary: sessionStorage.getItem('rsvpDietary') || '',
          brunch: sessionStorage.getItem('rsvpBrunch') || '',
          song: sessionStorage.getItem('rsvpSong') || ''
        };

        if (!data.guestName) { alert('Please enter your name.'); return; }
        if (!data.attending) { alert('Please select if you will be joining us.'); return; }

        /* visual feedback */
        var btnParent = span;
        for (var b = 0; b < 8; b++) { if (btnParent.parentElement) btnParent = btnParent.parentElement; else break; }
        var origOpacity = btnParent.style.opacity;
        btnParent.style.opacity = '0.5';
        btnParent.style.pointerEvents = 'none';

        fetch('/api/rsvp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        .then(function(res) { return res.json(); })
        .then(function(result) {
          btnParent.style.opacity = origOpacity;
          btnParent.style.pointerEvents = '';
          if (result.success) {
            alert('Thank you, ' + data.guestName + '! Your RSVP has been received.');
          } else {
            alert('Something went wrong: ' + (result.error || 'Unknown error'));
          }
        })
        .catch(function(err) {
          btnParent.style.opacity = origOpacity;
          btnParent.style.pointerEvents = '';
          alert('Network error – please try again.');
          console.error('RSVP submit error:', err);
        });
      }
    }
    document.addEventListener('pointerdown', submitBlock, true);
    document.addEventListener('click', submitAction, true);
  }

  /* ── main setup ── */
  function setup() {
    /* text inputs */
    makeTextField('Enter guest name(s)', 'rsvpGuestName', function() {
      return findSmallestTextElement(document, 'Enter guest name(s)');
    });
    makeTextField('Share any dietary restrictions', 'rsvpDietary', function() {
      return findSmallestTextElement(document, 'Share any dietary restrictions');
    });
    makeTextField('Share a song that will get you on the dance floor', 'rsvpSong', function() {
      return findSmallestTextElement(document, 'Share a song that will get you on the dance floor');
    });

    /* dropdowns */
    makeDropdown('Will you be joining us?', ['Joyfully Accept', 'Regretfully Decline'], 'rsvpAttending');
    makeDropdown('Will you need accommodation for the night of October 3?', ['Yes, please', 'No, thank you'], 'rsvpAccommodation');
    makeDropdown('What is your transportation plan?', ['I will drive myself', 'I need a ride', 'Other'], 'rsvpTransportation');
    makeDropdown('Would you be interested in joining us for Sunday brunch?', ['Yes, count me in!', 'No, thank you'], 'rsvpBrunch', function() {
      return findSmallestTextElement(document, 'Would you be interested in joining us for Sunday brunch?');
    });

    /* submit */
    wireSubmit();
  }

  /* retry until Canva renders */
  var attempts = 0;
  var timer = setInterval(function() {
    attempts++;
    var testSpan = findByText(document, 'Enter guest name(s)') || findByTextIncludes(document, 'Enter guest name');
    if (testSpan) { clearInterval(timer); setup(); }
    else if (attempts > 100) { clearInterval(timer); }
  }, 200);
})();
