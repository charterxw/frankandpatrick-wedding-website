<script>
(function() {
  function setup() {
    function findByText(root, text) {
      var spans = root.querySelectorAll('span');
      for (var i = 0; i < spans.length; i++) {
        if (spans[i].textContent.trim() === text && spans[i].children.length === 0) return spans[i];
      }
      return null;
    }

    function getBoxParent(el) {
      var p = el;
      for (var i = 0; i < 10; i++) {
        if (!p.parentElement) break;
        p = p.parentElement;
        var s = window.getComputedStyle(p);
        if (s.position === 'absolute' || s.position === 'relative') return p;
      }
      return el.parentElement;
    }

    // Find dollar buttons
    var amounts = ['$50', '$100', '$200', '$500'];
    var btnEls = {};
    for (var i = 0; i < amounts.length; i++) {
      var span = findByText(document, amounts[i]);
      if (!span) return false;
      btnEls[amounts[i]] = getBoxParent(span);
    }

    // Find the $ sign span, walk up to its box, then get next sibling div = amount field
    var dollarSpan = findByText(document, '$');
    if (!dollarSpan) return false;
    var dollarBox = getBoxParent(dollarSpan);
    var amountBox = dollarBox.nextElementSibling;
    if (!amountBox) return false;

    // Find the deepest span inside the amount box to edit
    var amountSpan = amountBox.querySelector('span') || amountBox;
    console.log('[gifting] amountBox text:', amountSpan.textContent.trim());

    // Make editable
    amountSpan.contentEditable = 'true';
    amountSpan.style.outline = 'none';
    amountSpan.style.cursor = 'text';
    amountSpan.style.minWidth = '40px';
    amountSpan.style.display = 'inline-block';

    amountSpan.addEventListener('focus', function() {
      if (amountSpan.textContent.trim() === 'Enter Amount') amountSpan.textContent = '';
    });
    amountSpan.addEventListener('blur', function() {
      if (amountSpan.textContent.trim() === '') amountSpan.textContent = 'Enter Amount';
    });

    // Wire buttons
    Object.keys(btnEls).forEach(function(label) {
      var btn = btnEls[label];
      var value = label.replace('$', '');
      btn.style.cursor = 'pointer';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        amountSpan.textContent = value;
        console.log('[gifting] set amount to ' + value);
      });
    });

    console.log('[gifting] setup complete');
    return true;
  }

  var tries = 0;
  var timer = setInterval(function() {
    tries++;
    if (setup()) clearInterval(timer);
    else if (tries > 150) { console.log('[gifting] gave up'); clearInterval(timer); }
  }, 200);
})();
</script>
