          var allShapes = [];
          paths.forEach(function(p) { allShapes.push(p); });
          rects.forEach(function(r) { allShapes.push(r); });
          ellipses.forEach(function(e) { allShapes.push(e); });
          var origFills = allShapes.map(function(s) { return s.getAttribute('fill'); });
          return { el: ov, shapes: allShapes, origFills: origFills };
        }
      }
      return null;
    }

    var buttonData = [];
    Object.keys(btnEls).forEach(function(label) {
      var btn = btnEls[label];
      var value = label.replace('$', '');
      btn.style.cursor = 'pointer';

      var clickHandler = function(e) {
        e.stopPropagation();
        amountSpan.textContent = '$' + value;

      btn.addEventListener('click', clickHandler);
      if (ovalInfo) {

      if (matched && matched.ovalInfo) {

          window._currentNoteSpan.focus();

  // --- NAV BUTTON FIX (100% UNTOUCHED FROM YOUR UPLOADED FILE) ---
  var navListenerAdded = false;
  function fixNavButtons() {
    if (navListenerAdded) return;
    navListenerAdded = true;
    document.addEventListener('click', function(e) {
      var clickedLink = e.target.closest('a');
      if (clickedLink) return;

      var t = e.target;
      while (t && t !== document.body) {
        if (t.contentEditable === 'true' || t.isContentEditable) return;
        t = t.parentElement;
      }

      var links = document.querySelectorAll('a');
      var navLinks = [];
      links.forEach(function(a) {
        var text = a.textContent.trim().toUpperCase();
        if (text === 'NEXT' || text === '\u2039' || text === 'PAY') {
          var r = a.getBoundingClientRect();
          if (r.width > 0 && r.height > 0) {
            navLinks.push({ el: a, rect: r });
          }
        }
      });
      if (navLinks.length === 0) return;

      var clickX = e.clientX, clickY = e.clientY;
      var inNavArea = false;
      for (var i = 0; i < navLinks.length; i++) {
        var n = navLinks[i].el;
        for (var u = 0; u < 15; u++) {
          if (!n.parentElement) break;
          n = n.parentElement;
          if (n.previousElementSibling) {
            var btnParent = n.parentElement;
            if (btnParent) {
              var rect = btnParent.getBoundingClientRect();
              if (clickX >= rect.left && clickX <= rect.right &&
                  clickY >= rect.top && clickY <= rect.bottom) {
                inNavArea = true;
              }
            }
            break;
          }
        }
        if (inNavArea) break;
      }

      if (!inNavArea) return;

      var closest = null;
      var closestDist = Infinity;
      for (var j = 0; j < navLinks.length; j++) {
        var r = navLinks[j].rect;
        var cx = (r.left + r.right) / 2;
        var cy = (r.top + r.bottom) / 2;
        var dist = Math.sqrt((clickX - cx) * (clickX - cx) + (clickY - cy) * (clickY - cy));
        if (dist < closestDist) {
          closestDist = dist;
          closest = navLinks[j];
        }
      }

      if (closest) {
        e.preventDefault();
        e.stopPropagation();

        var targetHash = closest.el.getAttribute('href');
        if (targetHash && targetHash.startsWith('#')) {
          window.location.hash = targetHash;
        } else {
          closest.el.click();
        }
      }
    }, true);
  }
