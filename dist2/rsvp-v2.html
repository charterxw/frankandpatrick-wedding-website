<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body { margin: 0; background: #fffaf0; color: #4b3526; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; }
img { display: block; max-width: none; }
a { color: inherit; text-decoration: none; }

/* ── Section 1: Header Bar ── */
.header-bar {
  background: #fffaf0;
  height: 20vh;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 20px;
  overflow: hidden;
}
.header-bar .subtitle {
  font-family: YAFdJsyuOPM_1, sans-serif;
  font-weight: 600;
  font-size: clamp(10px, 2.5vw, 14px);
  letter-spacing: 0.254em;
  text-transform: uppercase;
  color: #654040;
  line-height: 2;
}
.header-bar .title {
  font-family: YAFdJsyuOPM_1, sans-serif;
  font-weight: 600;
  font-size: clamp(24px, 7vw, 44px);
  letter-spacing: 0.015em;
  text-transform: uppercase;
  color: #553f2d;
  line-height: 1.1;
  margin-top: 5px;
  text-align: center;
}
.header-bar .date-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 13px;
}
.header-bar .date-line .date-part {
  font-family: YAFdJsyuOPM_1, sans-serif;
  font-weight: 400;
  font-size: clamp(7px, 1.8vw, 9.8px);
  letter-spacing: 0.075em;
  line-height: 15px;
  color: #654040;
  transform: translateY(-2px);
}
.header-bar .date-line .city {
  font-family: YAGLy38gVoc_0, serif;
  font-weight: 400;
  font-size: clamp(16px, 4vw, 24px);
  letter-spacing: -0.1em;
  line-height: 34px;
  color: #654040;
}

/* ── Section 2: Hero ── */
.hero {
  background: #ceab90;
  position: relative;
  height: 80vh;
  min-height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.hero-title {
  position: relative;
  font-family: YAGLy38gVoc_0, serif;
  font-weight: 400;
  font-size: clamp(50px, 13vw, 93px);
  color: #fffcf9;
  line-height: 1.1;
  z-index: 1;
}

/* ── Section 3: RSVP Content ── */
.rsvp-content {
  background: #fffaf0;
  min-height: 100vh;
  padding: clamp(30px, 8vw, 60px) 20px clamp(40px, 10vw, 80px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* ── Decorative Composition ── */
.decor-wrapper {
  width: 100%;
  overflow: visible;
  margin-bottom: 40px;
  position: relative;
}
.decor {
  position: relative;
  width: 560px;
  height: 390px;
  left: calc(50% + min(35px, 10vw));
  transform: translateX(-50%);
  transform-origin: center top;
}
.decor .fl {
  position: absolute;
  overflow: hidden;
}
.decor .fl img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.decor .polaroid {
  position: absolute;
  overflow: hidden;
}
.decor .polaroid > img.frame {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: relative;
  z-index: 0;
}
.decor .polaroid > img.photo {
  position: absolute;
  top: 6%;
  left: 6%;
  width: 88%;
  height: 75%;
  object-fit: cover;
  z-index: 1;
}


/* ── RSVP Text ── */

}
.rsvp-btn {

  letter-spacing: 0.382em;
  text-transform: uppercase;
  cursor: default;
}

/* ── Footer ── */

/* ── Animations ── */
.fade-in { opacity: 0; transition: opacity 1.2s ease-out; }
.fade-in.visible { opacity: 1; }
.slide-up { opacity: 0; transform: translateY(40px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
.slide-up.visible { opacity: 1; transform: translateY(0); }

<script>
(function() {
  /* ── 1. Scale composition on narrow viewports ── */
  var decor = document.getElementById('rsvp-decor');
  var decorWrapper = document.querySelector('.decor-wrapper');
  var decorW = 560, decorH = 390;
  function scaleDecor() {
    if (!decor || !decorWrapper) return;
    var vw = window.innerWidth;
    if (vw < decorW + 40) {
      var s = (vw - 40) / decorW;
      decor.style.transform = 'translateX(-50%) scale(' + s + ')';
      decorWrapper.style.height = Math.round(decorH * s) + 'px';
    } else {
      decor.style.transform = 'translateX(-50%)';
      decorWrapper.style.height = '';
    }
  }

  function onResize() {
    scaleDecor();
  }
  window.addEventListener('resize', onResize);
  onResize();

  /* ── 3. Fade-in animations ── */
  var rsvpSection = document.querySelector('.rsvp-content');
  if (rsvpSection) {
    // Background flowers — staggered fast fade
    var bgFlowers = decor.querySelectorAll('.fl.fade-in');
    bgFlowers.forEach(function(el, i) {
      el.style.transitionDelay = (i * 0.02) + 's';
    });

    // Photos — slide up
    var photos = decor.querySelectorAll('.slide-up');
    photos.forEach(function(el, i) {
      el.style.transitionDelay = (0.6 + i * 0.1) + 's';
    });

    // Text and button
    var textEls = rsvpSection.querySelectorAll(':scope > .fade-in');

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          // Show flowers immediately
          bgFlowers.forEach(function(el) { el.classList.add('visible'); });
          // Show photos after flowers
          setTimeout(function() {
            photos.forEach(function(el) { el.classList.add('visible'); });
          }, 400);
          // Show text after photos
          setTimeout(function() {
            textEls.forEach(function(el, i) {
              setTimeout(function() { el.classList.add('visible'); }, i * 200);
            });
          }, 1200);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    observer.observe(rsvpSection);
  }
})();
</script>
